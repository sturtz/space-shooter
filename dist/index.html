<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Space Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script type="module" crossorigin src="./assets/index-DrtDS3HO.js"></script>
  </head>
  <body>
    <!-- Portrait orientation overlay -->
    <div id="rotate-overlay">
      <div class="rotate-content">
        <svg
          class="rotate-icon"
          viewBox="0 0 100 100"
          width="80"
          height="80"
          fill="none"
          stroke="#00ffe7"
          stroke-width="3"
        >
          <rect x="25" y="10" width="50" height="80" rx="6" />
          <circle cx="50" cy="80" r="4" fill="#00ffe7" />
          <path
            d="M10 50 A40 40 0 0 1 50 10"
            stroke="#00ffe7"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
          />
          <polygon points="8,42 10,52 18,46" fill="#00ffe7" />
        </svg>
        <p>Rotate your device to landscape</p>
      </div>
    </div>

    <div id="game-container">
      <canvas id="game"></canvas>
      <div id="volume-control">
        <span id="volume-icon">♪</span>
        <input type="range" id="music-volume" min="0" max="1" step="0.01" value="0.2" />
      </div>
    </div>

  </body>
</html>
