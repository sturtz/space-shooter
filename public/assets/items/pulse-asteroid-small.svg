<svg xmlns="http://www.w3.org/2000/svg" viewBox="-46 -47 92 80">
  <!--
    Small asteroid — 6 sides, compact and angular. Fast-feeling.
    s≈8, scale ×5. Pivot at origin for in-game tumble rotation.
  -->
  <defs>
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b1"/>
      <feGaussianBlur stdDeviation="7" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer bloom -->
  <g filter="url(#bloom)" opacity="0.3">
    <polygon points="28,2 18,30 -10,26 -32,4 -22,-28 8,-32 32,-15"
      fill="none" stroke="#9999bb" stroke-width="5"/>
  </g>

  <!-- Body fill -->
  <polygon points="28,2 18,30 -10,26 -32,4 -22,-28 8,-32 32,-15"
    fill="#2a2c44" fill-opacity="0.95"/>

  <!-- Body edge -->
  <polygon points="28,2 18,30 -10,26 -32,4 -22,-28 8,-32 32,-15"
    fill="none" stroke="#8888aa" stroke-width="1.6" stroke-linejoin="round"
    filter="url(#edge)"/>

  <!-- Surface crack -->
  <line x1="-14" y1="-12" x2="8" y2="18"
    stroke="#5a5c78" stroke-width="0.9" stroke-opacity="0.65"/>
</svg>
