<svg xmlns="http://www.w3.org/2000/svg" viewBox="-95 -105 190 215">
  <!--
    Big asteroid — 8 sides, chunky and irregular. More surface detail.
    s≈18, scale ×5. Pivot at origin for in-game tumble rotation.
  -->
  <defs>
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer bloom -->
  <g filter="url(#bloom)" opacity="0.32">
    <polygon points="72,5 48,68 -18,82 -72,38 -78,-28 -42,-78 12,-88 68,-52"
      fill="none" stroke="#9999bb" stroke-width="8"/>
  </g>

  <!-- Body fill — slightly cooler, more blue-purple -->
  <polygon points="72,5 48,68 -18,82 -72,38 -78,-28 -42,-78 12,-88 68,-52"
    fill="#272942" fill-opacity="0.96"/>

  <!-- Body edge -->
  <polygon points="72,5 48,68 -18,82 -72,38 -78,-28 -42,-78 12,-88 68,-52"
    fill="none" stroke="#8888bb" stroke-width="2" stroke-linejoin="round"
    filter="url(#edge)"/>

  <!-- Primary crack (long diagonal) -->
  <line x1="-35" y1="-25" x2="22" y2="45"
    stroke="#4e5072" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Secondary crack (shorter, branching feel) -->
  <line x1="-35" y1="-25" x2="-58" y2="10"
    stroke="#4e5072" stroke-width="0.9" stroke-opacity="0.5"/>

  <!-- Subtle upper-face highlight -->
  <line x1="62" y1="-18" x2="18" y2="-80"
    stroke="#aaaacc" stroke-width="0.9" stroke-opacity="0.22"/>
</svg>
