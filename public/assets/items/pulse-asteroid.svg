<svg xmlns="http://www.w3.org/2000/svg" viewBox="-64 -55 128 110">
  <!--
    Asteroid — canonical 7-sided irregular polygon.
    Computed from main-screen-bg.html drawEnemy() at s=12, phase=0:
      jitter = 0.78 + 0.22 * sin(angle * 2.3)
    Vertices × 5 for SVG scale. Pivot at origin (tumbles in place in-game).

    Approximate polygon: 47,0  36,45  -13,35  -45,13  -49,-26  -1,-39  41,-21
  -->
  <defs>
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Faint outer glow ── -->
  <g filter="url(#bloom)" opacity="0.35">
    <polygon points="47,0 36,45 -13,35 -45,13 -49,-26 -1,-39 41,-21"
      fill="none" stroke="#9999bb" stroke-width="6"/>
  </g>

  <!-- ── Body fill ── -->
  <polygon points="47,0 36,45 -13,35 -45,13 -49,-26 -1,-39 41,-21"
    fill="#2a2c44" fill-opacity="0.95"/>

  <!-- ── Body edge (dim neon) ── -->
  <polygon points="47,0 36,45 -13,35 -45,13 -49,-26 -1,-39 41,-21"
    fill="none" stroke="#8888aa" stroke-width="1.8" stroke-linejoin="round"
    filter="url(#edge)"/>

  <!-- ── Surface crack ── -->
  <line x1="-18" y1="-12" x2="9" y2="21"
    stroke="#5a5c78" stroke-width="1" stroke-opacity="0.65"/>

  <!-- ── Subtle inner highlight (upper-left face catch) ── -->
  <line x1="36" y1="-5" x2="10" y2="-35"
    stroke="#aaaacc" stroke-width="0.8" stroke-opacity="0.28"/>
</svg>
