<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#4488ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" opacity="0.6"/>
  <!-- Inner gravitational rings -->
  <circle cx="32" cy="32" r="18" opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="32" cy="32" r="10" opacity="0.3" stroke-dasharray="3 3"/>
  <!-- Core -->
  <circle cx="32" cy="32" r="4" fill="#4488ff" stroke="none" opacity="0.8"/>
  <!-- Inward spiral arcs -->
  <path d="M 52 20 A 18 18 0 0 1 44 44" opacity="0.7"/>
  <path d="M 12 44 A 18 18 0 0 1 20 20" opacity="0.7"/>
  <path d="M 44 52 A 18 18 0 0 1 20 44" opacity="0.5"/>
  <path d="M 20 12 A 18 18 0 0 1 44 20" opacity="0.5"/>
  <!-- Arrow tips pointing inward -->
  <polyline points="44,44 40,38 38,44" opacity="0.7"/>
  <polyline points="20,20 24,26 26,20" opacity="0.7"/>
</svg>
