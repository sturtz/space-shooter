<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Neon bloom glow -->
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Softer glow for geometry -->
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ship edge glow -->
    <filter id="shipglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feGaussianBlur stdDeviation="4" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#060612" rx="16"/>

  <!-- ═══ Sacred Geometry: Concentric rings ═══ -->
  <g opacity="0.12" filter="url(#softglow)">
    <!-- Ring 1 — innermost -->
    <circle cx="64" cy="64" r="18" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
    <!-- Ring 2 -->
    <circle cx="64" cy="64" r="30" fill="none" stroke="#4488ff" stroke-width="0.4"/>
    <!-- Ring 3 -->
    <circle cx="64" cy="64" r="44" fill="none" stroke="#aa44ff" stroke-width="0.35"/>
    <!-- Ring 4 — outermost -->
    <circle cx="64" cy="64" r="56" fill="none" stroke="#00d4ff" stroke-width="0.3"/>
  </g>

  <!-- ═══ Sacred Geometry: Flower of Life petals ═══ -->
  <g opacity="0.09" filter="url(#softglow)">
    <!-- 6 overlapping circles forming flower of life -->
    <circle cx="64" cy="49" r="15" fill="none" stroke="#00d4ff" stroke-width="0.6"/>
    <circle cx="77" cy="56.5" r="15" fill="none" stroke="#4488ff" stroke-width="0.6"/>
    <circle cx="77" cy="71.5" r="15" fill="none" stroke="#aa44ff" stroke-width="0.6"/>
    <circle cx="64" cy="79" r="15" fill="none" stroke="#00d4ff" stroke-width="0.6"/>
    <circle cx="51" cy="71.5" r="15" fill="none" stroke="#4488ff" stroke-width="0.6"/>
    <circle cx="51" cy="56.5" r="15" fill="none" stroke="#aa44ff" stroke-width="0.6"/>
    <!-- Center circle -->
    <circle cx="64" cy="64" r="15" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <!-- ═══ Sacred Geometry: Golden spiral hint ═══ -->
  <g opacity="0.08">
    <path d="M64,64 Q64,50 72,44 Q84,36 92,48 Q102,64 88,78 Q72,94 54,84 Q34,72 42,52 Q50,32 70,30"
      fill="none" stroke="#aa44ff" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- ═══ Sacred Geometry: Connection lines (web) ═══ -->
  <g opacity="0.06">
    <!-- Radial lines from center to ring dots -->
    <line x1="64" y1="64" x2="64" y2="8" stroke="#00d4ff" stroke-width="0.3"/>
    <line x1="64" y1="64" x2="112.5" y2="36" stroke="#4488ff" stroke-width="0.3"/>
    <line x1="64" y1="64" x2="112.5" y2="92" stroke="#aa44ff" stroke-width="0.3"/>
    <line x1="64" y1="64" x2="64" y2="120" stroke="#00d4ff" stroke-width="0.3"/>
    <line x1="64" y1="64" x2="15.5" y2="92" stroke="#4488ff" stroke-width="0.3"/>
    <line x1="64" y1="64" x2="15.5" y2="36" stroke="#aa44ff" stroke-width="0.3"/>
  </g>

  <!-- ═══ Ring dots (nodes on geometry) ═══ -->
  <g opacity="0.25">
    <!-- Inner ring (6 dots) -->
    <circle cx="64" cy="46" r="1.2" fill="#00d4ff"/>
    <circle cx="79.6" cy="55" r="1.2" fill="#4488ff"/>
    <circle cx="79.6" cy="73" r="1.2" fill="#aa44ff"/>
    <circle cx="64" cy="82" r="1.2" fill="#00d4ff"/>
    <circle cx="48.4" cy="73" r="1.2" fill="#4488ff"/>
    <circle cx="48.4" cy="55" r="1.2" fill="#aa44ff"/>
    <!-- Outer ring (6 dots) -->
    <circle cx="64" cy="20" r="1" fill="#00d4ff"/>
    <circle cx="102.1" cy="42" r="1" fill="#4488ff"/>
    <circle cx="102.1" cy="86" r="1" fill="#aa44ff"/>
    <circle cx="64" cy="108" r="1" fill="#00d4ff"/>
    <circle cx="25.9" cy="86" r="1" fill="#4488ff"/>
    <circle cx="25.9" cy="42" r="1" fill="#aa44ff"/>
  </g>

  <!-- ═══ Player Ship (centered, neon stroke style) ═══ -->
  <!-- Ship bloom layer -->
  <g filter="url(#bloom)" opacity="0.5">
    <polygon
      points="64,24 76,56 74,72 86,78 82,86 70,80 64,88 58,80 46,86 42,78 54,72 52,56"
      fill="none" stroke="#00d4ff" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Ship dark fill -->
  <polygon
    points="64,24 76,56 74,72 86,78 82,86 70,80 64,88 58,80 46,86 42,78 54,72 52,56"
    fill="#001428" fill-opacity="0.92"/>

  <!-- Ship crisp neon hull -->
  <g filter="url(#shipglow)">
    <polygon
      points="64,24 76,56 74,72 86,78 82,86 70,80 64,88 58,80 46,86 42,78 54,72 52,56"
      fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- Ship center spine -->
  <line x1="64" y1="30" x2="64" y2="78" stroke="#00d4ff" stroke-width="0.6" opacity="0.4"/>

  <!-- Ship wing accent lines -->
  <line x1="70" y1="72" x2="83" y2="80" stroke="#00d4ff" stroke-width="0.5" opacity="0.35"/>
  <line x1="58" y1="72" x2="45" y2="80" stroke="#00d4ff" stroke-width="0.5" opacity="0.35"/>

  <!-- Ship cockpit -->
  <ellipse cx="64" cy="48" rx="6" ry="8" fill="#00d7ff" fill-opacity="0.55" stroke="#00d4ff" stroke-width="0.5"/>
  <!-- Cockpit highlight -->
  <ellipse cx="62" cy="44" rx="2.5" ry="3.5" fill="#d2f8ff" fill-opacity="0.25"/>

  <!-- ═══ Engine thruster glow ═══ -->
  <g filter="url(#bloom)" opacity="0.6">
    <polygon points="60,84 64,98 68,84" fill="#00ccff"/>
  </g>
  <polygon points="61,85 64,94 67,85" fill="#00d4ff" fill-opacity="0.7"/>
  <polygon points="62.5,86 64,91 65.5,86" fill="#ffffff" fill-opacity="0.5"/>

  <!-- ═══ Accent particles (fibonacci positions) ═══ -->
  <g opacity="0.35">
    <!-- Golden angle distributed sparkles -->
    <circle cx="38" cy="28" r="0.8" fill="#00d4ff"/>
    <circle cx="95" cy="38" r="0.7" fill="#aa44ff"/>
    <circle cx="28" cy="76" r="0.6" fill="#4488ff"/>
    <circle cx="100" cy="95" r="0.8" fill="#00d4ff"/>
    <circle cx="32" cy="102" r="0.5" fill="#aa44ff"/>
    <circle cx="96" cy="68" r="0.6" fill="#4488ff"/>
  </g>
</svg>
