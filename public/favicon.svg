<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #0a0e27; }
      .ship { fill: #00ffe7; }
      .accent { fill: #ff00ff; }
    </style>
  </defs>
  <rect class="bg" width="100" height="100"/>
  <!-- Spaceship -->
  <polygon class="ship" points="50,20 70,60 50,50 30,60"/>
  <!-- Thruster flames -->
  <polygon class="accent" points="45,50 55,50 50,70"/>
  <!-- Stars -->
  <circle class="ship" cx="20" cy="25" r="2"/>
  <circle class="ship" cx="80" cy="30" r="2"/>
  <circle class="ship" cx="25" cy="75" r="1.5"/>
  <circle class="ship" cx="75" cy="70" r="1.5"/>
</svg>
